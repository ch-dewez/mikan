<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    @import "colors.css";

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--current-bg-gradient);
      color: var(--current-text-main);
      transition: background 0.3s, color 0.3s;
    }

    /* Header */
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .header-content h1 {
      color: var(--brand-primary);
      font-size: 24px;
    }

    .header-subtitle {
      font-size: 11px;
      color: var(--current-text-sub);
    }

    .dark-mode-toggle {
      background: var(--bg-tertiary);
      border: 1px solid var(--current-border);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
    }

    body.dark-mode .dark-mode-toggle {
      background: var(--dark-bg-secondary);
    }

    /* Buttons */
    .btn-dashboard {
      width: 100%;
      background: linear-gradient(135deg, var(--heatmap-level-4) 0%, var(--brand-primary) 100%);
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-weight: 600;
      color: var(--text-on-accent);
      cursor: pointer;
      margin-bottom: 16px;
      box-shadow: var(--current-shadow);
    }

    /* Cards & Stats */
    .card,
    .stat-box,
    .manual-timing {
      background: var(--current-bg-card);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: var(--current-shadow);
      transition: all 0.3s;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--brand-primary);
    }

    .stat-label {
      font-size: 9px;
      text-transform: uppercase;
      color: var(--current-text-sub);
    }

    /* Status Card Variants */
    .status-card.active {
      border-left: 4px solid var(--activity-speaking);
    }

    .status-card.wrong-lang {
      border-left: 4px solid var(--heatmap-level-3);
    }

    .status-card.paused {
      border-left: 4px solid var(--activity-watching);
    }

    .status-card.inactive {
      border-left: 4px solid var(--current-border);
    }

    .status-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--current-text-main);
      margin-bottom: 4px;
    }

    .status-subtext {
      font-size: 11px;
      color: var(--current-text-sub);
    }

    .status-subtext:empty {
      display: none;
    }

    .btn-force {
      margin-top: 10px;
      background: var(--current-bg-secondary);
      border: 1px solid var(--current-border);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 600;
      color: var(--current-text-sub);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-force:hover {
      background: var(--current-bg-tertiary);
    }


    .btn-force.forced {
      background: #fef3c7;
      border-color: #fcd34d;
      /*color: #92400e;*/
    }

    /* Manual Timing Refactored */
    .manual-timing {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .duration-selector {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-secondary);
    }

    .duration-selector input {
      width: 50px;
      height: 40px;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      border: 2px solid var(--border-secondary);
      border-radius: 8px;
      color: var(--brand-primary);
      background: var(--current-bg-card);
    }

    .manual-timing label {
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--current-text-sub);
      margin-bottom: 4px;
      display: block;
    }

    .manual-timing select,
    .manual-timing input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--current-border);
      border-radius: 6px;
      background: var(--current-bg-card);
      color: var(--current-text-main);
    }

    .submit-button button {
      width: 100%;
      background: var(--brand-primary);
      color: var(--text-on-accent);
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    .submit-button button:hover {
      background: var(--brand-tertiary);
    }

    /* Footer */
    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border-secondary);
      text-align: center;
      font-size: 10px;
      color: var(--current-text-sub);
    }

    .footer a {
      color: var(--brand-primary);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="header-row">
    <div class="header-content">
      <h1 style="font-size: 24px; margin-bottom: 4px;">🍊 Mikan <span class="kanji"
          style="font-size: 18px; opacity: 0.85;">見間</span></h1>
      <p style="font-size: 11px;" class="header-subtitle">Japanese Immersion Time Tracker</p>
    </div>
    <button class="dark-mode-toggle" id="dark-mode-btn" title="Toggle dark mode">🌙</button>
  </div>

  <button class="btn-dashboard" id="dashboard-btn">
    📊 Open Dashboard
  </button>

  <div class="card status-card inactive" id="status-card">
    <div class="status-text" id="status-text">Checking...</div>
    <div class="status-subtext" id="status-subtext"></div>
    <button class="btn-force" id="force-btn" style="display: none;">Force Japanese</button>
  </div>

  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-value" id="today-time">0:00</div>
      <div class="stat-label">Today</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="week-time">0:00</div>
      <div class="stat-label">This Week</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="month-time">0:00</div>
      <div class="stat-label">This Month</div>
    </div>
  </div>

  <form class="manual-timing" id="manual-timing">
    <div class="duration-selector">
      <input type="number" id="hours" name="hours" min="0" max="23" value="0">
      <p>h :</p>
      <input type="number" id="minutes" name="minutes" min="0" max="59" value="0">
      <p>m</p>
    </div>
    <div class="category-selector">
      <label for="category">Category:</label>
      <select type="text" name="category" id="category">
        <option value="Watching">Watching</option>
        <option value="Reading">Reading</option>
        <option value="Speaking">Speaking</option>
      </select>
    </div>
    <div class="website-input">
      <label for="website">Website (can be left blank):</label>
      <input type="text" name="website" id="website">
    </div>

    <div class="submit-button">
      <button type="sumbit">Add time</button>
    </div>
  </form>

  <div class="footer">
    Created by <a href="https://www.youtube.com/JouzuJuls" target="_blank" rel="noopener">Jouzu Juls</a> · <a
      href="https://ko-fi.com/jouzujuls" target="_blank" rel="noopener">☕ Support on Ko-fi</a> · © 2026
  </div>

  <script src="popup.js"></script>
</body>

</html>
